services:
  fastapi:
    image: falcondock/fastapi:dev
    build:
      context: .
      dockerfile: Dockerfile
    ports: 
      - "8000:8000"
  
  streamlit:
    image: falcondock/streamlit:dev
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    ports: 
      - "8501:8501"
    environment:
      API_URL: "http://fastapi:8000"